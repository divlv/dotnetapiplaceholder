# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: 25Build and deploy ASP.Net Core app to Azure Web App - icfdr25apiapp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build with dotnet
        run: dotnet build .\dotnetapiplaceholder.csproj --configuration Release

      - name: Publish to Application virtual directory layout
        shell: pwsh
        run: |
          $publishRoot = Join-Path $env:GITHUB_WORKSPACE 'publish'
          $applicationPath = Join-Path $publishRoot 'Application'
          $systemPath = Join-Path $publishRoot 'System'
          $servicesPath = Join-Path $publishRoot 'Services'
          if (Test-Path $publishRoot) {
            Remove-Item -LiteralPath $publishRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $applicationPath -Force | Out-Null
          New-Item -ItemType Directory -Path $systemPath -Force | Out-Null
          New-Item -ItemType Directory -Path $servicesPath -Force | Out-Null
          dotnet publish .\dotnetapiplaceholder.csproj -c Release -o $applicationPath
          Copy-Item -Path (Join-Path $applicationPath '*') -Destination $systemPath -Recurse -Force
          Copy-Item -Path .\deploy\Services\* -Destination $servicesPath -Recurse -Force

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ github.workspace }}\publish

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: publish
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7B56F3FF6BB940F081797851AF35F126 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7DCBA7DE2CC3451BAFA6B924547C0E64 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_BE7B74F0D00E4B238060CB7EB4CCA082 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'aegcavdsmmr1apiapp'
          slot-name: 'Production'
          package: publish      

